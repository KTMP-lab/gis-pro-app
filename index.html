<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIS Pro Manager - Pop-up UI & Smart ID 100%</title>

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.css" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://unpkg.com/leaflet-kmz@latest/dist/leaflet-kmz.js"></script>
    <script src="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; font-family: 'Kanit', sans-serif; background-color: #000; }
        #map { width: 100%; height: 100%; z-index: 1; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 9999; }
        
        /* แถบตัวกรองด้านบน */
        #top-bar { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 75%; display: flex; gap: 6px; padding: 12px; align-items: center; justify-content: center; z-index: 9999; }
        .filter-select { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Kanit'; font-size: 13px; outline: none; }
        #search-box { flex: 1.5; background: #fff; border: 2px solid #2563eb; font-weight: 600; }

        /* 🌟 ปุ่มนำเข้า (มุมขวาบน) */
        #btn-open-upload { position: absolute; top: 15px; right: 15px; z-index: 10000; background: #2563eb; color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 600; font-family: 'Kanit'; font-size: 14px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; }
        #btn-open-upload:hover { background: #1d4ed8; transform: translateY(-2px); }

        /* 🌟 แผงหน้าต่างซ้าย (บานพับ) */
        #btn-show-sidebar { position: absolute; top: 80px; left: 15px; z-index: 9998; padding: 10px 15px; background: #1e293b; color: white; border: none; border-radius: 8px; font-family: 'Kanit'; cursor: pointer; font-weight: 600; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #left-sidebar { position: absolute; top: 80px; left: 15px; width: 450px; bottom: 30px; display: flex; flex-direction: column; overflow: hidden; transition: transform 0.4s ease-in-out; z-index: 9999; }
        #left-sidebar.hidden { transform: translateX(-480px); }
        .sidebar-header { padding: 12px 15px; background: #1e293b; color: white; display: flex; justify-content: space-between; align-items: center; border-radius: 12px 12px 0 0; }
        
        .tab-header { display: flex; background-color: #f1f5f9; border-bottom: 1px solid #cbd5e1; }
        .tab-btn { flex: 1; padding: 12px; font-family: 'Kanit'; font-weight: 600; cursor: pointer; border: none; border-bottom: 3px solid transparent; color: #64748b; background: none;}
        .tab-btn.active { color: #2563eb; border-bottom: 3px solid #2563eb; background: #fff; }
        
        .tab-content { display: none; padding: 15px; overflow-y: auto; flex: 1; background: #fff; border-radius: 0 0 12px 12px; }
        .tab-content.active { display: block; }
        #tab-stats.active { display: flex !important; flex-direction: column; padding: 0; } 
        
        /* ตารางและเลเยอร์ */
        .excel-table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
        .excel-table th { background-color: #f8fafc; color: #1e293b; padding: 8px; text-align: center; white-space: nowrap; position: sticky; top: 0; border-bottom: 2px solid #e2e8f0; }
        .excel-table td { padding: 8px; border-bottom: 1px solid #e2e8f0; text-align: center; }
        .excel-table td:nth-child(2) { text-align: left; font-weight: 500; } 
        .layer-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: #f8fafc; border-radius: 8px; margin-bottom: 6px; border: 1px solid #e2e8f0; }

        /* 🌟 หน้าต่าง Modal (ป๊อปอัปนำเข้าข้อมูล) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 100001; display: none; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 500px; max-width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; font-family: 'Kanit'; max-height: 90vh; overflow-y: auto; }
        .close-modal-btn { position: absolute; top: 15px; right: 15px; font-size: 20px; border: none; background: none; color: #64748b; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .close-modal-btn:hover { color: #ef4444; }
        
        /* สไตล์ฟอร์มใน Modal */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; color: #1e293b; font-weight: 600; margin-bottom: 4px; }
        .form-input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-family: 'Kanit'; font-size: 13px; }
        .form-input:disabled { background: #f1f5f9; cursor: not-allowed; }
        .btn-save { width: 100%; padding: 12px; border: none; background: #16a34a; color: white; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 5px; font-family: 'Kanit'; font-size: 14px;}
        .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }
        .status-badge { padding: 12px; margin-bottom: 15px; border-radius: 6px; font-size: 14px; font-weight: 600; text-align: center; }
        .status-ready { background: #f0fdf4; border: 1px solid #22c55e; color: #166534; }
        .status-locked { background: #fef2f2; border: 1px solid #ef4444; color: #991b1b; }

        #hud-box { position: absolute; bottom: 25px; right: 10px; background: rgba(0,0,0,0.7); color: #00FFCC; padding: 10px 18px; border-radius: 8px; font-family: monospace; font-size: 13px; z-index: 9999; border: 1px solid rgba(0, 255, 204, 0.4); }
        .my-kmz-label { background: transparent !important; border: none !important; box-shadow: none !important; color: #ffeb3b !important; font-weight: bold; text-shadow: 2px 2px 4px #000; font-size: 14px; }
        
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); z-index: 100005; display: none; justify-content: center; align-items: center; flex-direction: column; color: white; }
        .loader-container { position: relative; width: 180px; height: 180px; display: flex; justify-content: center; align-items: center; }
        .logo-center { width: 135px; height: 135px; background: url('images.jpg') no-repeat center/contain; border-radius: 50%; z-index: 10; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .spinning-border { position: absolute; width: 170px; height: 170px; border: 6px solid rgba(255,255,255,0.1); border-top: 6px solid #16a34a; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* ขยับ Leaflet Controls หลบปุ่มนำเข้า */
        .leaflet-top.leaflet-right { top: 70px !important; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader-container"><div class="logo-center"></div><div class="spinning-border"></div></div>
        <div id="loading-text" style="margin-top:15px; font-size:15px; font-weight:600;">กำลังประมวลผล...</div>
    </div>

    <button id="btn-open-upload" onclick="openUploadModal()">☁️ นำเข้าข้อมูล</button>

    <div id="map"></div>

    <div id="top-bar" class="glass-panel">
        <select class="filter-select" id="f-agency" onchange="loadDataByAgency(this.value); updateImportBadge();">
            <option value="" disabled selected hidden>-- 1. สร.รว. --</option>
        </select>
        <select class="filter-select" id="f-year" onchange="filterAll(); updateImportBadge();">
            <option value="" disabled selected hidden>-- 2. ปีงบประมาณ --</option>
            <option value="2569">2569</option>
            <option value="2568">2568</option>
            <option value="2567">2567</option>
        </select>
        <select class="filter-select" id="f-prov" onchange="populateProj(); filterAll();">
            <option value="" disabled selected hidden>-- 3. จังหวัด --</option>
        </select>
        <select class="filter-select" id="f-proj" onchange="filterAll()">
            <option value="" disabled selected hidden>-- 4. โครงการ --</option>
        </select>
        <input type="text" class="filter-select" id="search-box" placeholder="🔍 ค้นหารหัส Smart ID หรือชื่อโครงการ..." onkeyup="filterAll()">
    </div>

    <button id="btn-show-sidebar" onclick="toggleSidebar()">☰ แผงข้อมูล</button>

    <div id="left-sidebar" class="glass-panel">
        <div class="sidebar-header">
            <span style="font-weight:600;">📋 รายการข้อมูลแผนงาน</span>
            <button onclick="toggleSidebar()" style="background:none; border:none; color:white; cursor:pointer; font-size:14px;">❌ ปิดแผงข้อมูล</button>
        </div>
        <div class="tab-header">
            <button class="tab-btn active" onclick="openTab(event, 'tab-stats')">📊 ตารางงาน</button>
            <button class="tab-btn" id="v-count" onclick="openTab(event, 'tab-layers')">🗂️ เวกเตอร์ (0)</button>
            <button class="tab-btn" id="d-count" onclick="openTab(event, 'tab-drones')">🚁 โดรน (0)</button>
        </div>
        
        <div id="tab-stats" class="tab-content active">
            <div style="flex:1; overflow-y:auto;">
                <table class="excel-table">
                    <thead>
                        <tr>
                            <th>Smart ID</th>
                            <th>โครงการ / งาน</th>
                            <th>กม.ต้น</th>
                            <th>กม.ปลาย</th>
                            <th>ระยะ (กม.)</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-stats"></tbody>
                </table>
            </div>
            <div id="table-summary" style="padding:12px; background:#1e293b; color:white; font-size:13px; font-weight:600; display:flex; justify-content:space-between;">
                <span>📈 รวม: - งาน</span>
                <span>🛣️ ระยะ: - กม.</span>
            </div>
        </div>

        <div id="tab-layers" class="tab-content"><div id="list-vectors"></div></div>
        <div id="tab-drones" class="tab-content"><div id="list-drones"></div></div>
    </div>

    <div id="upload-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal-btn" onclick="closeUploadModal()">✖</button>
            <h3 style="margin-top:0; margin-bottom:15px; color:#1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">📥 นำเข้าข้อมูล (Smart ID)</h3>
            
            <div id="import-badge" class="status-badge status-locked">⚠️ โปรดเลือก สร.รว. และ ปีงบประมาณ จากแถบด้านบนก่อน</div>
            <input type="hidden" id="i-year" value="">

            <div class="form-group"><label>จังหวัด</label><select class="form-input" id="i-prov"><option value="">-- รอการเลือกหน่วยงาน --</option></select></div>
            <div style="display:flex; gap:10px; margin-bottom:12px;">
                <div style="flex:1;"><label>รหัสโครงการ</label><input type="text" class="form-input" id="i-id" placeholder="214" list="h-ids"></div>
                <div style="flex:1;"><label>รหัสงานย่อย</label><input type="text" class="form-input" id="i-job" placeholder="001" list="h-jobs"></div>
            </div>
            <div class="form-group"><label>ชื่อโครงการ / งาน</label><input type="text" class="form-input" id="i-name" list="h-names"></div>
            <div style="display:flex; gap:10px; margin-bottom:12px;">
                <div style="flex:1;"><label>กม.ต้น</label><input type="number" class="form-input" id="i-km-start" value="0" step="0.001"></div>
                <div style="flex:1;"><label>กม.ปลาย</label><input type="number" class="form-input" id="i-km-end" value="0" step="0.001"></div>
            </div>
            <div class="form-group"><label>แนบไฟล์ข้อมูล (เวกเตอร์ / โดรน)</label><input type="file" id="i-file" class="form-input" style="padding:5px;"><button class="btn-save" id="btn-upload" style="background:#3b82f6;" onclick="uploadFile()">☁️ อัปโหลดขึ้น R2 Cloud</button></div>
            <input type="text" id="i-link" class="form-input" readonly placeholder="ลิงก์ไฟล์จากระบบคลาวด์จะปรากฏที่นี่" style="background:#f1f5f9; margin-bottom:15px;">
            <button class="btn-save" id="btn-save-data" onclick="saveData()">💾 บันทึกเข้าระบบ Smart ID</button>
            
            <datalist id="h-ids"></datalist><datalist id="h-jobs"></datalist><datalist id="h-names"></datalist>
        </div>
    </div>

    <div id="hud-box">UTM Zone --</div>

    <script>
        const API = "https://my-gis-backend.onrender.com";
        const map = L.map('map', { zoomControl: false }).setView([15.5, 100], 6);
        L.tileLayer('https://mt0.google.com/vt/lyrs=y&x={x}&y={y}&z={z}').addTo(map);
        L.control.polylineMeasure({ position: 'topright', unit: 'metres' }).addTo(map);

        map.on('mousemove', function(e) {
            const z = Math.floor((e.latlng.lng + 180) / 6) + 1;
            const utm = proj4('+proj=longlat', `+proj=utm +zone=${z} +units=m`, [e.latlng.lng, e.latlng.lat]);
            document.getElementById('hud-box').innerHTML = `📍 Lat: ${e.latlng.lat.toFixed(5)}, Lon: ${e.latlng.lng.toFixed(5)}<br>🎯 UTM Zone ${z}: X=${utm[0].toFixed(2)}, Y=${utm[1].toFixed(2)}`;
        });

        let allData = [];
        const activeLayers = {};

        function showL(text) { 
            document.getElementById('loading-overlay').style.display='flex'; 
            if(text) document.getElementById('loading-text').innerText = text;
        }
        function hideL() { document.getElementById('loading-overlay').style.display='none'; }

        // 🌟 ฟังก์ชันพับเก็บหน้าต่าง (Sidebar)
        function toggleSidebar() {
            document.getElementById('left-sidebar').classList.toggle('hidden');
        }

        // 🌟 ฟังก์ชันเปิด-ปิด ป๊อปอัปนำเข้า
        function openUploadModal() {
            document.getElementById('upload-modal').style.display = 'flex';
            updateImportBadge(); // อัปเดตป้ายสถานะทันทีที่เปิด
        }
        function closeUploadModal() {
            document.getElementById('upload-modal').style.display = 'none';
        }

        function updateImportBadge() {
            const agency = document.getElementById("f-agency").value;
            const year = document.getElementById("f-year").value;
            const badge = document.getElementById("import-badge");
            const inputs = ["i-prov", "i-id", "i-job", "i-name", "i-km-start", "i-km-end", "i-file", "btn-upload", "btn-save-data"];

            if (!agency || !year) {
                badge.className = "status-badge status-locked";
                badge.innerHTML = "⚠️ โปรดเลือก สร.รว. และ ปีงบประมาณ จากแถบด้านบนก่อน";
                inputs.forEach(id => document.getElementById(id).disabled = true);
            } else {
                badge.className = "status-badge status-ready";
                badge.innerHTML = `🎯 <strong>เป้าหมายนำเข้า:</strong> ${agency} | แผนปี ${year}`;
                document.getElementById("i-year").value = year; 
                inputs.forEach(id => document.getElementById(id).disabled = false);
            }
        }

        async function loadDataByAgency(agency) {
            if(!agency) {
                document.getElementById("f-prov").innerHTML = '<option value="" disabled selected hidden>-- 3. จังหวัด --</option>';
                document.getElementById("i-prov").innerHTML = '<option value="">-- รอการเลือกหน่วยงาน --</option>';
                allData = []; // ล้างข้อมูล
                filterAll();
                return;
            }
            showL(`🔍 กำลังเชื่อมโยงคลังข้อมูล ${agency}...`);
            try {
                const res = await fetch(`${API}/api/projects/by-agency?agency=${agency}&_t=${Date.now()}`);
                allData = await res.json();
                
                const provinces = [...new Set(allData.map(d => d['จังหวัด']))].filter(Boolean).sort();
                const pSel = document.getElementById("f-prov");
                const iPSel = document.getElementById("i-prov");
                
                pSel.innerHTML = '<option value="" disabled selected hidden>-- 3. จังหวัด --</option>';
                iPSel.innerHTML = '<option value="">-- เลือกจังหวัด --</option>';
                
                provinces.forEach(p => { 
                    pSel.appendChild(new Option(p, p)); 
                    iPSel.appendChild(new Option(p, p)); 
                });
                filterAll();
            } finally { hideL(); }
        }

        function populateProj() {
            const prov = document.getElementById("f-prov").value;
            const pSel = document.getElementById("f-proj");
            pSel.innerHTML = '<option value="" disabled selected hidden>-- 4. โครงการ --</option>';
            if(!prov) return;
            const projs = [...new Set(allData.filter(d => d['จังหวัด'] === prov).map(d => d['ชื่อโครงการ']))].filter(Boolean).sort();
            projs.forEach(p => pSel.appendChild(new Option(p, p)));

            const filtered = allData.filter(d => d['จังหวัด'] === prov);
            updateSuggestions(filtered);
        }

        function updateSuggestions(data) {
            const ids = [...new Set(data.map(d => d['รหัสโครงการ']))].filter(Boolean);
            const names = [...new Set(data.map(d => d['ชื่อโครงการ']))].filter(Boolean);
            document.getElementById('h-ids').innerHTML = ids.map(v => `<option value="${v}">`).join('');
            document.getElementById('h-names').innerHTML = names.map(v => `<option value="${v}">`).join('');
        }

        function filterAll() {
            const yearVal = document.getElementById("f-year").value;
            const year = yearVal ? yearVal.slice(-2) : '';
            const prov = document.getElementById("f-prov").value;
            const proj = document.getElementById("f-proj").value;
            const key = document.getElementById("search-box").value.toLowerCase();
            const agencyRaw = document.getElementById("f-agency").value;
            const agencyNum = agencyRaw ? agencyRaw.replace('สร.รว.', '') : '';

            let sumDist = 0;
            let countProj = 0;

            const filtered = allData.filter(d => {
                const mPr = !prov || d['จังหวัด'] === prov;
                const mPj = !proj || d['ชื่อโครงการ'] === proj;
                const smartID = `${agencyNum}-${year}-${d['รหัสโครงการ']}`;
                const mKy = !key || smartID.includes(key) || (d['ชื่อโครงการ']||'').toLowerCase().includes(key);
                return mPr && mPj && mKy;
            });

            const html = filtered.map(d => {
                const start = parseFloat(d['กม.ต้น'] || 0);
                const end = parseFloat(d['กม.ปลาย'] || 0);
                const dist = Math.abs(end - start);
                
                sumDist += dist;
                countProj++;

                return `
                    <tr>
                        <td style="color:#2563eb; font-weight:600;">${agencyNum}-${year}-${d['รหัสโครงการ']}</td>
                        <td>${d['ชื่อโครงการ']}<br><small style="color:#64748b;">จ.${d['จังหวัด']}</small></td>
                        <td>${start.toFixed(3)}</td>
                        <td>${end.toFixed(3)}</td>
                        <td style="background:#f8fafc; font-weight:600; color:#16a34a;">${dist.toFixed(3)}</td>
                    </tr>
                `;
            }).join('');

            document.getElementById("tbody-stats").innerHTML = html ? html : '<tr><td colspan="5" style="text-align:center; padding:15px;">ไม่พบข้อมูล หรือยังไม่ได้เลือก สร.รว.</td></tr>';
            
            document.getElementById("table-summary").innerHTML = `
                <span>📈 รวม: ${countProj} งาน</span>
                <span>🛣️ ระยะ: ${sumDist.toFixed(3)} กม.</span>
            `;

            updateFileCounts(allData);
        }

        function updateFileCounts(data) {
            let vMap = new Map(), dMap = new Map();
            data.forEach(p => (p.files || []).forEach(f => {
                if(f['ประเภทไฟล์']==='KMZ' || f['ประเภทไฟล์']==='KML') vMap.set(f['ลิงก์จาก R2'], {url: f['ลิงก์จาก R2'], name: p['ชื่อโครงการ'], prov: p['จังหวัด']});
                else if(f['ประเภทไฟล์']==='Drone') dMap.set(f['ลิงก์จาก R2'], {url: f['ลิงก์จาก R2'], name: p['ชื่อโครงการ'], prov: p['จังหวัด']});
            }));
            document.getElementById("v-count").innerText = `🗂️ เวกเตอร์ (${vMap.size})`;
            document.getElementById("d-count").innerText = `🚁 โดรน (${dMap.size})`;
            renderFiles("list-vectors", Array.from(vMap.values()), 'v');
            renderFiles("list-drones", Array.from(dMap.values()), 'd');
        }

        function renderFiles(id, files, mode) {
            document.getElementById(id).innerHTML = files.length ? files.map(f => `
                <div class="layer-item">
                    <input type="checkbox" onchange="${mode==='v'?'toggleV':'toggleD'}('${f.url}', this, '${f.prov}')">
                    <div><strong>${f.name}</strong><br><small>${f.prov}</small></div>
                </div>
            `).join('') : '<p style="text-align:center; color:#94a3b8; font-size:13px; margin-top:15px;">ไม่มีไฟล์ข้อมูลใน สร.รว. นี้</p>';
        }

        function toggleV(url, cb) {
            if(cb.checked) {
                const l = L.kmzLayer(url).addTo(map); activeLayers[url] = l;
                l.on('load', e => {
                    e.layer.eachLayer(sub => {
                        const name = sub.feature.properties.name || "ไม่มีชื่อ";
                        sub.bindTooltip(name, { permanent: true, className: 'my-kmz-label' });
                    });
                    map.fitBounds(e.layer.getBounds());
                });
            } else { if(activeLayers[url]) { map.removeLayer(activeLayers[url]); delete activeLayers[url]; } }
        }

        async function toggleD(url, cb, prov) {
            if(cb.checked) {
                activeLayers[url] = L.tileLayer(url, { maxNativeZoom: 20, maxZoom: 22 }).addTo(map);
                if(prov) {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=จังหวัด${prov.replace('จ.','')}`);
                    const data = await res.json();
                    if(data.length) map.flyTo([data[0].lat, data[0].lon], 11);
                }
            } else { if(activeLayers[url]) { map.removeLayer(activeLayers[url]); delete activeLayers[url]; } }
        }

        async function uploadFile() {
            const f = document.getElementById('i-file').files[0];
            if(!f) return alert("⚠️ กรุณาเลือกไฟล์ก่อนอัปโหลดครับ");
            showL("⏳ กำลังส่งไฟล์ดิบเข้าสู่ Cloud R2...");
            const fd = new FormData(); fd.append('file', f);
            try {
                const res = await fetch(`${API}/api/upload`, { method:'POST', body:fd });
                const r = await res.json();
                if(r.status==="success") { document.getElementById('i-link').value = r.url; alert("✅ อัปโหลดขึ้นคลาวด์สำเร็จ!"); }
            } catch(e) { alert("❌ การอัปโหลดล้มเหลว"); } 
            finally { hideL(); }
        }

        async function saveData() {
            const payload = {
                agency: document.getElementById("f-agency").value,
                year: document.getElementById("i-year").value,
                province: document.getElementById("i-prov").value,
                project_id: document.getElementById("i-id").value.trim(),
                job_id: document.getElementById("i-job").value.trim(),
                km_start: document.getElementById("i-km-start").value,
                km_end: document.getElementById("i-km-end").value,
                survey_link: document.getElementById("i-link").value
            };
            if(!payload.survey_link || !payload.project_id || !payload.province) return alert("⚠️ กรอกรหัสและอัปโหลดไฟล์ข้อมูลให้ครบถ้วนก่อนครับ");
            showL("💾 กำลังบันทึกข้อมูลเข้าระบบ Smart ID...");
            try {
                await fetch(`${API}/api/add-project`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
                alert("✅ ระบบบันทึกพิกัดและข้อมูลสำเร็จ!");
                
                document.getElementById("i-id").value = "";
                document.getElementById("i-job").value = "";
                document.getElementById("i-name").value = "";
                document.getElementById("i-link").value = "";
                document.getElementById("i-km-start").value = "0";
                document.getElementById("i-km-end").value = "0";
                
                closeUploadModal(); // ปิดหน้าต่างนำเข้าอัตโนมัติเมื่อบันทึกเสร็จ
                loadDataByAgency(payload.agency); // โหลดฐานข้อมูลใหม่
            } catch(e) { alert("❌ บันทึกไม่สำเร็จ"); } 
            finally { hideL(); }
        }

        function openTab(e, id) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active'); e.currentTarget.classList.add('active');
        }

        const aSel = document.getElementById("f-agency");
        for(let i=1; i<=17; i++) aSel.appendChild(new Option(`สร.รว.${i}`, `สร.รว.${i}`));
        updateImportBadge();
    </script>
</body>
</html>
