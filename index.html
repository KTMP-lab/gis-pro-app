<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIS Pro Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <script src="https://unpkg.com/leaflet-kmz@latest/dist/leaflet-kmz.js"></script>
    <script src="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; font-family: 'Kanit', sans-serif; background-color: #0b0f19; }
        #map { width: 100%; height: 100%; z-index: 1; }
        
        /* 🌀 Loading */
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(11, 15, 25, 0.85); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; }
        #loading-overlay.show { opacity: 1; pointer-events: all; }
        .spinner-img { width: 60px; height: 60px; border-radius: 50%; box-shadow: 0 0 10px #38bdf8; }

        /* 🔘 ปุ่มควบคุม */
        .hud-btn { position: absolute; z-index: 9997; padding: 8px 12px; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; font-family: 'Kanit'; font-weight: 600; color: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.4); }
        #btn-left { top: 70px; left: 15px; color: #38bdf8; }
        #btn-right { top: 70px; right: 15px; color: #10b981; }
        #btn-upload { top: 115px; right: 15px; color: #fbbf24; }

        /* 🗂️ แผงซ้าย & ขวา (เท่ากัน) */
        .sidebar { position: absolute; top: 120px; width: 400px; bottom: 25px; display: flex; flex-direction: column; background: rgba(15,23,42,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; z-index: 9998; transition: 0.3s; }
        #left-sidebar { left: 15px; }
        #right-sidebar { right: 15px; border-color: rgba(16, 185, 129, 0.3); }

        .header { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 600; }
        
        /* 🛒 ตะกร้าและสไลเดอร์แบบบาง */
        .layer-item { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .slider-slim { width: 100%; height: 3px; background: #334155; border-radius: 2px; accent-color: #10b981; margin-top: 5px; }

        /* 📤 หน้าต่างขาวอัปโหลด */
        .modal-overlay { position: fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(255,255,255,0.3); backdrop-filter:blur(5px); z-index:100000; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; }
        .modal-box { width: 400px; background: #fff; padding: 20px; border-radius: 8px; color: #333; font-size: 11px; }
        .form-control { width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; margin-bottom: 8px; }

        .leaflet-control-polyline-measure { font-size: 10px !important; }
    </style>
</head>
<body>
    <div id="loading-overlay"><img src="https://pub-4961c816153f421dbb5a81bb6ac5d11c.r2.dev/images.jpg" class="spinner-img"></div>
    <button id="btn-left" class="hud-btn" onclick="document.getElementById('left-sidebar').classList.toggle('hidden')">☰ คลังข้อมูล</button>
    <button id="btn-right" class="hud-btn" onclick="document.getElementById('right-sidebar').classList.toggle('hidden')">🛒 LAYER</button>
    <button id="btn-upload" class="hud-btn" onclick="document.getElementById('upload-modal').classList.add('show')">📤 อัปโหลด</button>

    <div id="map"></div>

    <div id="left-sidebar" class="sidebar">
        <div class="header">📂 คลังข้อมูล <button onclick="this.parentElement.parentElement.classList.add('hidden')">❌</button></div>
        <div id="list-vectors" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="right-sidebar" class="sidebar">
        <div class="header" style="color:#10b981;">🛒 LAYER <button onclick="this.parentElement.parentElement.classList.add('hidden')">❌</button></div>
        <div id="list-cart" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="upload-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="header" style="padding:0; margin-bottom:10px;">📤 อัปโหลดข้อมูล <button onclick="this.parentElement.parentElement.parentElement.classList.remove('show')">❌</button></div>
            <form id="upload-form">
                <input type="text" class="form-control" id="up-prov" placeholder="จังหวัด">
                <input type="text" class="form-control" id="up-proj-name" placeholder="ชื่อโครงการ">
                <button type="submit" class="btn-submit" style="width:100%; padding:8px;">บันทึก</button>
            </form>
        </div>
    </div> <script>
        const API = "https://my-gis-backend.onrender.com";
        const map = L.map('map', { zoomControl: true }).setView([15.5, 100], 6);
        
        // --- 🗺️ แผนที่ฐาน ---
        L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}').addTo(map);
        
        // --- 📏 ปุ่มไม้บรรทัด (เล็กลง) ---
        L.control.polylineMeasure({ position: 'topright', unit: 'metres', measureControlTitle: 'วัดระยะ', clearControlTitle: 'ล้าง' }).addTo(map);

        // --- 🛒 1. ฟังก์ชันตะกร้า (LAYER) ---
        const cartItems = new Map();
        const activeLayers = {};
        const simpleHash = str => new Uint32Array([str.split('').reduce((h, c) => Math.imul(31, h) + c.charCodeAt(0) | 0, 0)])[0].toString(36);

        window.addToCart = function(safeId, url, name, prov, type) {
            if(cartItems.has(safeId)) return;
            if(cartItems.size >= 10) return alert("เต็มแล้ว!");
            cartItems.set(safeId, { url, name, prov, type, checked: true, opacity: 1 });
            renderCartUI();
            toggleLayer(safeId, url, true, type, prov);
        };

        window.renderCartUI = function() {
            document.getElementById("c-count").innerText = `LAYER (${cartItems.size}/10)`;
            let html = "";
            cartItems.forEach((f, safeId) => {
                html += `
                    <div class="layer-item">
                        <div style="display:flex; align-items:center; gap:8px;">
                            <input type="checkbox" checked onchange="toggleCartSwitch('${safeId}', this.checked)">
                            <strong style="font-size:11px; flex:1;">${f.name}</strong>
                            <button onclick="removeFromCart('${safeId}')" style="font-size:9px;">❌</button>
                        </div>
                        <input type="range" class="slider-slim" min="0" max="1" step="0.05" value="${f.opacity}" 
                               oninput="changeOpacity('${safeId}', this.value)">
                    </div>`;
            });
            document.getElementById('list-cart').innerHTML = html || '<p style="font-size:10px; text-align:center;">ว่างเปล่า</p>';
        };

        window.changeOpacity = function(safeId, val) {
            let f = cartItems.get(safeId);
            if(f) {
                f.opacity = val;
                let layer = activeLayers[safeId];
                if(layer) {
                    if(f.type === 'v' && layer.eachLayer) layer.eachLayer(s => s.setOpacity ? s.setOpacity(val) : null);
                    else if (f.type === 'd' && layer.setOpacity) layer.setOpacity(val);
                }
            }
        };

        function removeFromCart(safeId) {
            let f = cartItems.get(safeId);
            if(f) { toggleLayer(safeId, f.url, false, f.type, f.prov); cartItems.delete(safeId); renderCartUI(); }
        }

        // --- 🗺️ ดึงไฟล์เข้าสู่แผนที่ ---
        async function toggleLayer(safeId, url, turnOn, type, prov) {
            if(turnOn && !activeLayers[safeId]) {
                if(type === 'v') {
                    const l = L.kmzLayer(url).addTo(map);
                    activeLayers[safeId] = l;
                } else {
                    activeLayers[safeId] = L.tileLayer(url).addTo(map);
                }
            } else if(!turnOn && activeLayers[safeId]) {
                map.removeLayer(activeLayers[safeId]); delete activeLayers[safeId];
            }
        }

        // --- 📤 ระบบอัปโหลด (กู้คืนครบ 100%) ---
        async function uploadFile(e) {
            e.preventDefault();
            const data = {
                agency: document.getElementById('up-agency')?.value,
                year: document.getElementById('up-year')?.value,
                projName: document.getElementById('up-proj-name')?.value
                // ... บอสใส่ฟิลด์อื่นๆ ตามฟอร์มใน HTML ได้เลยครับ
            };
            alert("กำลังส่งข้อมูล...");
            // API Call อยู่ที่นี่
        }

        // --- 🚀 เริ่มต้น ---
        document.getElementById('left-sidebar').classList.remove('hidden');
        document.getElementById('right-sidebar').classList.remove('hidden');
    </script>
</body>
</html>
